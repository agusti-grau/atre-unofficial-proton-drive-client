id: com.proton.drive
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: proton-gui
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.indicator.application
  - --own-name=org.kde.*

modules:
  - name: proton-drive
    buildsystem: simple
    build-commands:
      - cargo build --release --workspace --exclude proton-gui
      - cargo build --release -p proton-gui --features tray
      - install -Dm755 target/release/protond /app/bin/protond
      - install -Dm755 target/release/proton-drive /app/bin/proton-drive
      - install -Dm755 target/release/proton-gui /app/bin/proton-gui
      - install -Dm644 packaging/proton-drive.desktop /app/share/applications/com.proton.drive.desktop
      - install -Dm644 packaging/icons/proton-drive.svg /app/share/icons/hicolor/scalable/apps/com.proton.drive.svg
      - install -Dm644 packaging/com.proton.drive.metainfo.xml /app/share/metainfo/com.proton.drive.metainfo.xml
    build-options:
      env:
        CARGO_HOME: /run/build/proton-drive/cargo
    sources:
      - type: dir
        path: ..
