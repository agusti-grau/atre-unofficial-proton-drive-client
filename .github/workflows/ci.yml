name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libssl-dev \
            libsecret-1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libappindicator3-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check workspace compiles
        run: cargo check --workspace

      - name: Check tray feature compiles
        run: cargo check -p proton-gui --features tray

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Clippy with tray feature
        run: cargo clippy -p proton-gui --features tray -- -D warnings

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Smoke-test packaging files
        run: |
          test -f packaging/debian/changelog
          test -f packaging/debian/copyright
          test -f packaging/com.proton.drive.metainfo.xml
